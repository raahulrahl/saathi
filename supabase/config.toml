# Supabase local dev config. Project-id is used for local CLI only.
project_id = "saathi"

[api]
enabled = true
port = 54321

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
image_transformation = { enabled = true }
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false
double_confirm_changes = true
secure_password_change = false
max_frequency = "1s"

[auth.sms]
enable_signup = false
enable_confirmations = false

# OAuth providers intentionally omitted.
#
# Saathi uses Clerk for all authentication (see migration 0005_clerk.sql
# and middleware.ts). Supabase's built-in auth — including external OAuth
# providers like Google / LinkedIn / Twitter — is not exercised at all.
#
# The previous [auth.external.*] blocks referenced env(AUTH_GOOGLE_CLIENT_ID)
# etc., which broke `supabase db push` whenever those envs weren't set
# (which is always — they're Supabase-Auth-only variables that don't exist
# in .env.example because we don't use Supabase Auth).
#
# If you ever switch off Clerk, re-enable these by adding [auth.external.X]
# blocks and setting the env vars.
